<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/shared.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 猜数字游戏</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2>注册</h2>
        <div class="form-group">
            <label for="new-username">新用户名</label>
            <input type="text" id="new-username" placeholder="请输入新用户名">
            <label for="new-password">新密码</label>
            <input type="password" id="new-password" placeholder="请输入新密码" onkeypress="if(event.key === 'Enter') register()">
            <button onclick="register()">注册</button>
            <a href="login.html" class="return-link">←返回登录</a>
        </div>
    </div>
    <span style="color:grey; font-size:10px" onclick="turnToEdgeDownload()">无法正常游玩？下载 Microsoft Edge</span>
    <p id="version-text" style="color:grey; font-size:10px; cursor: pointer;" onclick="versionClick()">版本：25w04b</p>
    <p style="color:grey; font-size:7px">Copyright (C) IceWars1o1 2025</p>
</body>
</html>
