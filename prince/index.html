<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>小王子 The Little Prince</title>
        <style>
        /* 添加一些简单的样式，让图片显示更美观 */
        img {
            display: block; /* 每张图片独占一行 */
            margin: 10px auto; /* 水平居中，上下有间距 */
            max-width: 100%; /* 确保图片不会超出容器宽度 */
            height: auto; /* 保持图片的宽高比例 */
        }
        
        /* Footer styling */
        footer {
            background-color: #fff;
            border-top: 1px solid #ddd; /* Top border */
            padding: 2rem 0;
            text-align: center;
            margin-top: 2rem; /* Space between content and footer */
        }
        
        .footer-content {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .footer-section {
            flex: 1;
            text-align: left;
        }
        
        .footer-section h3 {
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        .footer-section p {
            margin: 0.5rem 0;
            color: #666;
        }
        
        .footer-section a {
            display: inline-block;
            margin: 0.5rem 0;
            color: #007bff;
            text-decoration: none;
        }
        
        .footer-section a:hover {
            text-decoration: underline;
        }
    </style>
    </head>
    <body>
        <div id="image-container"><!-- 动态生成图片 -->
            <script>
            // 获取图片容器
            const container = document.getElementById('image-container');

            // 图片数量
            const totalImages = 160;

            // 循环生成图片
            for (let i = 1; i <= totalImages; i++) {
                // 创建图片元素
                const img = document.createElement('img');
                // 设置图片的src属性
                img.src = `/res/${i.toString().padStart(3, '0')}.jpg`;
                // 将图片添加到容器中
                container.appendChild(img);
            }
        </script>
        </div>
        <footer>
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Legal</h3>
                    <p>© 2025 IceWars1o1. All rights reserved.</p>
                    <p>This project is licensed under the <a href="https://iw1o1.dpdns.org/copyright">MIT License</a>.</p>
                </div>
            </div>
        </footer>
    </body>
</html>
